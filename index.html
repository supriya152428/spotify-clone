<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPOTIFY - My Favourite Songs</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/1b130bdd87.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <ul>
      <li class="brand"><img src="logo.png" alt="Spotify-logo">Spotify</li>
      <li class="navItem active" data-section="home">Home</li>
      <li class="navItem" data-section="songs">Songs</li>
      <li class="navItem" data-section="about">About</li>
    </ul>
  </nav>

  <!-- Sections -->
  <div class="container" id="contentContainer">
    <!-- Default Home Section -->
    <h1 id="vibes">Soft Beats, Soft Hearts ✨</h1>
    <p>Welcome to your favorite songs collection!</p>
  </div>

  <!-- Music Controls -->
  <div class="bottom">
    <input type="range" id="myProgressBar" min="0" max="100" value="0">
    <div class="icons">
      <i class="fas fa-3x fa-step-backward" id="prev"></i>
      <i class="fas fa-3x fa-play-circle" id="masterPlay"></i>
      <i class="fas fa-3x fa-step-forward" id="next"></i>
    </div>
    <div class="songInfo">
      <img src="playing.gif" width="45px" alt="" id="gif">
      <span id="masterSongName">Blue</span>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
